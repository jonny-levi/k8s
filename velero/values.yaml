velero:
  # Fix kubectl image version
  kubectl:
    image:
      repository: bitnami/kubectl
      tag: "1.31"

  # Use node-agent (Restic/Kopia) for file-level backups
  deployNodeAgent: true

  nodeAgent:
    podVolumePath: /var/lib/kubelet/pods
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  # Use file-system backup by default for all PVs
  defaultVolumesToFsBackup: true

  configuration:
    backupStorageLocation:
      - name: nfs-backup
        provider: velero.io/aws
        bucket: velero
        credential:
          name: velero-s3-creds
          key: cloud
        config:
          region: minio
          s3ForcePathStyle: "true"
          s3Url: http://velero-minio.velero.svc:9000
          insecureSkipTLSVerify: "true"

    volumeSnapshotLocation: []
    defaultBackupStorageLocation: nfs-backup
    features: EnableCSI

  credentials:
    useSecret: true
    name: velero-s3-creds
    secretContents:
      cloud: |
        [default]
        aws_access_key_id = velero
        aws_secret_access_key = velero123456

  # AWS plugin for S3 compatibility
  initContainers:
    - name: velero-plugin-for-aws
      image: velero/velero-plugin-for-aws:v1.11.0
      volumeMounts:
        - mountPath: /target
          name: plugins

  # Backup schedules
  schedules:
    nextcloud-daily:
      disabled: false
      schedule: "0 2 * * *"
      useOwnerReferencesInBackup: false
      template:
        ttl: "168h"
        storageLocation: nfs-backup
        defaultVolumesToFsBackup: true
        includedNamespaces:
          - nextcloud

    vault-daily:
      disabled: false
      schedule: "0 2 * * *"
      useOwnerReferencesInBackup: false
      template:
        ttl: "168h"
        storageLocation: nfs-backup
        defaultVolumesToFsBackup: true
        includedNamespaces:
          - vault

    jenkins-daily:
      disabled: false
      schedule: "0 3 * * *"
      useOwnerReferencesInBackup: false
      template:
        ttl: "168h"
        storageLocation: nfs-backup
        defaultVolumesToFsBackup: true
        includedNamespaces:
          - jenkins

    ai-ops-daily:
      disabled: false
      schedule: "0 3 * * *"
      useOwnerReferencesInBackup: false
      template:
        ttl: "168h"
        storageLocation: nfs-backup
        defaultVolumesToFsBackup: true
        includedNamespaces:
          - ai-ops

    docker-registry-daily:
      disabled: false
      schedule: "0 4 * * *"
      useOwnerReferencesInBackup: false
      template:
        ttl: "168h"
        storageLocation: nfs-backup
        defaultVolumesToFsBackup: true
        includedNamespaces:
          - docker-registry

    staging-daily:
      disabled: false
      schedule: "0 4 * * *"
      useOwnerReferencesInBackup: false
      template:
        ttl: "168h"
        storageLocation: nfs-backup
        defaultVolumesToFsBackup: true
        includedNamespaces:
          - staging
