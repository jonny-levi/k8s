velero:
  # Use Restic (now called node-agent) for file-level backups
  deployNodeAgent: true

  # Node agent (Restic/Kopia) config
  nodeAgent:
    podVolumePath: /var/lib/kubelet/pods
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi

  # Velero server config
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  # Use file-system backup by default for all PVs
  defaultVolumesToFsBackup: true

  # Configuration
  configuration:
    # No cloud provider - using NFS via PVC
    backupStorageLocation:
      - name: nfs-backup
        provider: velero.io/aws
        bucket: velero
        credential:
          name: velero-s3-creds
          key: cloud
        config:
          region: minio
          s3ForcePathStyle: "true"
          s3Url: http://velero-minio.velero.svc:9000
          insecureSkipTLSVerify: "true"

    volumeSnapshotLocation: []

    # Default backup storage location
    defaultBackupStorageLocation: nfs-backup

    # Features
    features: EnableCSI

  # We'll deploy a MinIO instance backed by NFS for S3 compatibility
  # This is the simplest way to get Velero working with NFS
  credentials:
    useSecret: true
    name: velero-s3-creds
    secretContents:
      cloud: |
        [default]
        aws_access_key_id = velero
        aws_secret_access_key = velero123456

  # Schedules - daily backups for critical namespaces
  schedules:
    nextcloud-daily:
      disabled: false
      schedule: "0 2 * * *"
      useOwnerReferencesInBackup: false
      paused: false
      template:
        ttl: "168h"
        storageLocation: nfs-backup
        defaultVolumesToFsBackup: true
        includedNamespaces:
          - nextcloud

    vault-daily:
      disabled: false
      schedule: "0 2 * * *"
      useOwnerReferencesInBackup: false
      paused: false
      template:
        ttl: "168h"
        storageLocation: nfs-backup
        defaultVolumesToFsBackup: true
        includedNamespaces:
          - vault

    jenkins-daily:
      disabled: false
      schedule: "0 3 * * *"
      useOwnerReferencesInBackup: false
      paused: false
      template:
        ttl: "168h"
        storageLocation: nfs-backup
        defaultVolumesToFsBackup: true
        includedNamespaces:
          - jenkins

    ai-ops-daily:
      disabled: false
      schedule: "0 3 * * *"
      useOwnerReferencesInBackup: false
      paused: false
      template:
        ttl: "168h"
        storageLocation: nfs-backup
        defaultVolumesToFsBackup: true
        includedNamespaces:
          - ai-ops

    docker-registry-daily:
      disabled: false
      schedule: "0 4 * * *"
      useOwnerReferencesInBackup: false
      paused: false
      template:
        ttl: "168h"
        storageLocation: nfs-backup
        defaultVolumesToFsBackup: true
        includedNamespaces:
          - docker-registry

    staging-daily:
      disabled: false
      schedule: "0 4 * * *"
      useOwnerReferencesInBackup: false
      paused: false
      template:
        ttl: "168h"
        storageLocation: nfs-backup
        defaultVolumesToFsBackup: true
        includedNamespaces:
          - staging

  # Init containers to handle CRDs
  initContainers:
    - name: velero-plugin-for-aws
      image: velero/velero-plugin-for-aws:v1.11.0
      volumeMounts:
        - mountPath: /target
          name: plugins
